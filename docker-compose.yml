# ────────────────────────────────────────────────────────────────────────────
#  Reverse Face Search v2 — docker-compose for local prod-like deployment
# ────────────────────────────────────────────────────────────────────────────

services:
  rfs:
    build:
      context: .
      dockerfile: Dockerfile
    image: reverse-face-search:2.1.0
    container_name: rfs
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RFS_HOST: 0.0.0.0
      RFS_PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - rfs_data:/app/data       # SQLite + cache
      - rfs_dossiers:/app/dossiers
      - rfs_uploads:/app/uploads
      - rfs_logs:/app/logs
      - rfs_cache:/app/cache
      - rfs_reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Optional resource caps — uncomment for tight prod environments
    # deploy:
    #   resources:
    #     limits:
    #       memory: 2g
    #       cpus: "1.5"

volumes:
  rfs_data:
  rfs_dossiers:
  rfs_uploads:
  rfs_logs:
  rfs_cache:
  rfs_reports:
