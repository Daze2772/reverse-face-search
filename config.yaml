# Reverse Face Search v2 — Configuration
# Secrets (API keys, OpenSanctions, imgbb, 2captcha) belong in `.env`, NOT here.
# This file only configures behaviour.

# --- Image Upload Settings ---
upload:
  max_size_mb: 20
  allowed_types: ["image/jpeg", "image/png", "image/webp"]
  temp_dir: "uploads"
  auto_purge_after_search: true

# --- CAPTCHA Solver (secrets via env) ---
captcha:
  provider: "2captcha"
  api_key: ""          # → TWOCAPTCHA_API_KEY env var
  site_key_google: ""
  max_retries: 3
  timeout_seconds: 120

# --- Proxies (optional, override with RFS_PROXY_URL env) ---
proxy:
  enabled: false
  residential_url: ""
  rotation: "per_session"

# --- Reverse Search Engines ---
engines:
  yandex:
    enabled: true
    base_url: "https://yandex.com/images/search"
    timeout_seconds: 60
  google:
    enabled: true
    base_url: "https://lens.google.com"
    timeout_seconds: 60
  bing:
    enabled: true
    base_url: "https://www.bing.com/images/search?view=detailv2&iss=sbi"
    timeout_seconds: 60

# --- Browser / Playwright ---
browser:
  headless: true
  pool_size: 3
  stealth_mode: true
  user_agent_rotation: true
  viewport:
    width: 1920
    height: 1080

# --- Maigret ---
maigret:
  path: "maigret"
  timeout_per_username: 180
  max_sites: 250
  async_mode: true

# --- Clustering ---
clustering:
  social_domains:
    instagram: ["instagram.com"]
    linkedin: ["linkedin.com"]
    twitter: ["twitter.com", "x.com"]
    facebook: ["facebook.com", "fb.com"]
    tiktok: ["tiktok.com"]
    vsco: ["vsco.co"]
    snapchat: ["snapchat.com"]
    reddit: ["reddit.com"]
    pinterest: ["pinterest.com"]
    youtube: ["youtube.com"]
    github: ["github.com"]
    threads: ["threads.net"]
    bluesky: ["bsky.app"]
    mastodon: ["mastodon.social", "mastodon.online"]
  news_domains:
    [
      "news.", "bbc.com", "cnn.com", "reuters.com", "nytimes.com",
      "wikipedia.org", "theguardian.com", "washingtonpost.com",
      "wsj.com", "bloomberg.com", "apnews.com",
    ]
  forum_domains:
    ["reddit.com", "quora.com", "stackexchange.com", "stackoverflow.com",
     "hackernews", "ycombinator.com", "lobste.rs"]
  blog_domains:
    ["medium.com", "substack.com", "wordpress.com", "blogspot.com",
     "tumblr.com", "dev.to", "hashnode.com"]

# --- Logging ---
logging:
  level: "INFO"
  file: "logs/reverse_face_search.log"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

# --- Server (override with RFS_HOST / RFS_PORT env) ---
server:
  host: "0.0.0.0"
  port: 8000
  ws_heartbeat_seconds: 30
